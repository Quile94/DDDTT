<!DOCTYPE html>
<html>
<head>
<title>Chuyển Hướng Đa Năng</title>
<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const linkId = urlParams.get('id'); // Lấy ID từ URL, ví dụ: ?id=a

        if (!linkId) {
            // Nếu không có ID, chuyển đến trang lỗi hoặc trang chủ dự phòng
            window.location.href = 'https://www.google.com/search?q=lỗi+liên+kết+không+có+ID';
            return;
        }

        // Tải tệp links.json
        fetch('links.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                const targetUrl = data[linkId]; // Lấy URL đích dựa trên ID

                if (!targetUrl) {
                    // Nếu ID không tồn tại trong links.json
                    window.location.href = 'https://www.google.com/search?q=liên+kết+không+tìm+thấy';
                    return;
                }

                window.location.href = targetUrl; // Thực hiện chuyển hướng
            })
            .catch(error => {
                console.error('Error loading link data or during redirection:', error);
                window.location.href = 'https://www.google.com/search?q=lỗi+hệ+thống+chuyển+hướng'; // Lỗi hệ thống
            });
    };
</script>
</head>
<body>
    <p>Đang tải và chuyển hướng bạn...</p>
    <noscript>
        <p>Vui lòng bật JavaScript để tiếp tục.</p>
    </noscript>
</body>
</html>
